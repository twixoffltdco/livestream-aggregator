name: Update Live Streams Playlist

on:
  schedule:
    # Каждые 30 минут
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "bot/channels.json"
      - "bot/checker.py"

permissions:
  contents: write

concurrency:
  group: update-playlist
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg (нужен yt-dlp для некоторых форматов)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install --no-cache-dir -r bot/requirements.txt

      - name: Run search bot
        run: python bot/checker.py
        env:
          BOT_MAX_WORKERS: "6"
          BOT_TIMEOUT: "25"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/streams.json data/playlist.m3u8 docs/streams.json docs/playlist.m3u8
          if git diff --cached --quiet; then
            echo "Нет изменений, пропускаем коммит."
          else
            git commit -m "🔄 Автообновление плейлиста: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
